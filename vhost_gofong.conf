<VirtualHost *:80>
    ServerName gofong.com
    ServerAlias www.gofong.com
    DocumentRoot "D:/phpstudy_pro/WWW/www.gofong.com"
    
    <Directory "D:/phpstudy_pro/WWW/www.gofong.com">
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    
    ErrorLog "logs/gofong.com-error.log"
    CustomLog "logs/gofong.com-access.log" common
</VirtualHost>
