# 签务通 - 宝塔面板 nginx 配置
# 使用方法：
# 1. 登录宝塔面板
# 2. 网站 → 设置 → 配置文件
# 3. 复制以下内容替换原有配置
# 4. 保存并重载 nginx

server {
    listen 80;
    listen 443 ssl http2;
    server_name gofong.com www.gofong.com 8.140.224.53;
    
    # ===== 重要：项目根目录（不是 admin 目录！）=====
    root /www/wwwroot/www.gofong.com;
    index index.php index.html;
    
    # SSL 证书配置
    ssl_certificate /www/server/panel/vhost/cert/www.gofong.com/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/www.gofong.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000";
    error_page 497 https://$host$request_uri;
    
    # HTTP 自动跳转 HTTPS
    if ($server_port !~ 443){
        rewrite ^(/.*)$ https://$host$1 permanent;
    }
    
    # 日志配置
    access_log /www/wwwlogs/www.gofong.com.log;
    error_log /www/wwwlogs/www.gofong.com.error.log;
    
    # ===== 静态资源缓存 =====
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|css|js|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }
    
    # ===== PHP 处理（核心配置）=====
    location ~ \.php$ {
        fastcgi_pass unix:/tmp/php-cgi-74.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        try_files $uri =404;
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
        client_max_body_size 50M;
    }
    
    # ===== API 接口配置（修复 404 的关键）=====
    location /api/ {
        # 直接执行 PHP 文件，不重写 URL
        try_files $uri $uri/ =404;
    }
    
    # ===== 后台管理 =====
    location /admin/ {
        try_files $uri $uri/ /admin/index.php?$query_string;
    }
    
    # ===== 上传文件目录（重要：路径必须正确）=====
    location /uploads/ {
        alias /www/wwwroot/www.gofong.com/admin/uploads/;
        expires 7d;
        add_header Cache-Control "public";
        
        # 允许访问图片文件
        location ~* \.(jpg|jpeg|png|gif|svg|webp)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }
    
    # ===== 禁止访问敏感文件 =====
    location ~ /\. {
        deny all;
        return 404;
    }
    
    location ~* \.(env|git|svn|htaccess|htpasswd|log|sql|sh|bat)$ {
        deny all;
        return 404;
    }
    
    location ~* \.(bak|backup|old|orig|save|swp|dist)$ {
        deny all;
        return 404;
    }
    
    # ===== 安全头 =====
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
