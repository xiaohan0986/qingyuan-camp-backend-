# Nginx 配置 - 签务通 (gofong.com)
# 使用方法：复制到 /etc/nginx/sites-available/gofong.com
# 然后：ln -s /etc/nginx/sites-available/gofong.com /etc/nginx/sites-enabled/

# HTTP 重定向到 HTTPS
server {
    listen 80;
    server_name gofong.com www.gofong.com;
    return 301 https://$server_name$request_uri;
}

# HTTPS 主配置
server {
    listen 443 ssl http2;
    server_name gofong.com www.gofong.com;
    
    # 项目根目录
    root /var/www/gofong.com;
    index index.php index.html;
    
    # SSL 证书配置（使用 Let's Encrypt）
    ssl_certificate /etc/letsencrypt/live/gofong.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gofong.com/privkey.pem;
    
    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # HSTS（强制 HTTPS）
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # 静态资源缓存
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    location ~* \.(css|js|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }
    
    location ~* \.(pdf|doc|docx|xls|xlsx|zip|rar)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
    
    # PHP FastCGI 缓存（可选，根据需要启用）
    # 使用前需在 http 块（nginx.conf 主配置）中定义：
    #   fastcgi_cache_path /var/cache/nginx levels=1:2 keys_zone=PHP_CACHE:10m max_size=1g inactive=60m;
    #   fastcgi_cache_key "$scheme$request_method$host$request_uri";
    #
    # PHP 处理
    # 禁止执行 uploads 目录下的 PHP 文件
    location ~ ^/uploads/.*\.php$ {
        deny all;
        return 404;
    }

    # 禁止访问安装/设置类脚本
    location ~ (install|reset_install|quick_install|phpinfo)\.php$ {
        deny all;
        return 404;
    }

    # 禁止访问调试/备份类 PHP 文件
    location ~ (test_|debug_|capture_api|compare_data)\.php$ {
        deny all;
        return 404;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php7.4-fpm.sock;  # 根据实际 PHP 版本调整
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        
        # 防止路径遍历攻击
        try_files $uri =404;
        
        
        # FastCGI 缓存（生产环境建议开启，缓存非登录态页面）
        # 注意：管理后台页面因含动态数据，默认不缓存
        # fastcgi_cache PHP_CACHE;
        # fastcgi_cache_valid 200 302 10s;
        # fastcgi_cache_valid 404 1m;
        # fastcgi_cache_use_stale error timeout invalid_header updating http_500;
        # fastcgi_cache_min_uses 1;
        # fastcgi_cache_bypass $cookie_session $http_authorization;
        # fastcgi_no_cache $cookie_session $http_authorization;
        
        # 超时设置
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
        
        # 上传大小限制
        client_max_body_size 50M;
    }
    
    # API 接口配置
    location /api/ {
        try_files $uri $uri/ /api/index.php?$query_string;
        
        # 允许跨域（如果需要）
        # add_header 'Access-Control-Allow-Origin' '*' always;
        # add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        # add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
        
        # 处理 OPTIONS 请求
        # if ($request_method = 'OPTIONS') {
        #     add_header 'Access-Control-Allow-Origin' '*';
        #     add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
        #     add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization';
        #     add_header 'Content-Type' 'text/plain; charset=utf-8';
        #     add_header 'Content-Length' 0;
        #     return 204;
        # }
    }
    
    # 后台管理
    location /admin/ {
        try_files $uri $uri/ /admin/index.php?$query_string;
    }
    
    # 禁止访问敏感文件
    location ~ /\. {
        deny all;
        return 404;
    }
    
    location ~* \.(env|git|svn|htaccess|htpasswd|log|sql|sh|bat)$ {
        deny all;
        return 404;
    }
    
    # 禁止访问备份文件
    location ~* \.(bak|backup|old|orig|save|swp|dist)$ {
        deny all;
        return 404;
    }
    
    # 禁止访问数据库文件
    location ~* \.sql$ {
        deny all;
        return 404;
    }
    
    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # 日志配置
    access_log /var/log/nginx/gofong.com.access.log;
    error_log /var/log/nginx/gofong.com.error.log;
    
    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
}

# IPv6 支持
server {
    listen [::]:443 ssl http2;
    server_name gofong.com www.gofong.com;
    
    root /var/www/gofong.com;
    index index.php index.html;
    
    ssl_certificate /etc/letsencrypt/live/gofong.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gofong.com/privkey.pem;
    
    # 其他配置同上...
}
